# Using buildx action from: https://docs.docker.com/build/ci/github-actions/multi-platform/ and https://docs.docker.com/build/ci/github-actions/manage-tags-labels/
name: 'Build & Push Containers'
on:
  workflow_dispatch:
  push:
    paths:
      - communication_worker/**
      - .github/workflows/build-containers.yml
    branches:
      - "**"
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - "main"

env:
  DEPLOYMENT_NAME: cs

jobs:
  communication-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/communication-worker
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./communication_worker
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  restart-deployments:
    runs-on: ubuntu-latest
    needs:
      - communication-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: AWS configure
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region eu-west-1
          aws eks update-kubeconfig --region eu-west-1 --name communication-eks
      - name: Restart Communication Workers
        uses: actions-hub/kubectl@1.28.4
        env:
          KUBE_CONFIG: ${{ runner.workspace }}/.kube/config }}
        with:
          args: rollout restart deployment/${{ env.DEPLOYMENT_NAME }}-communication-worker