sendgrid:
  email-newsletter-api-key: ${EMAIL_NEWSLETTER_API}
  from-email: ${FROM_EMAIL}
  from-name: ${FROM_NAME}
  monthly-newsletter-template-id: ${MONTHLY_NEWSLETTER_TEMPLATE_ID}

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:email-gateway-db
    username: {DB_USERNAME:sa}
    password: {DB_PASSWORD:password}
  h2:
    console:
      enabled: false
  jpa:
    open-in-view: false

user1:
  email: ${USER1_EMAIL}

user2:
  email: ${USER2_EMAIL}
default-communication-history-access-provider:
  region: ${REGION:eu-west-1}
  table-name: ${COMMUNICATION_HISTORY_TABLE_NAME:communication-history}
logging:
  level:
    io.github.cameronward301.communication_scheduler.gateway_library: DEBUG
